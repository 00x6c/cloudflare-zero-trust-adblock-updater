name: Update Cloudflare OISD lists

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: cloudflare-oisd-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      OISD_SOURCE_URL: https://small.oisd.nl
      LIST_PREFIX: oisd-small-auto
      RULE_NAME: OISD Small Auto Block
      CHUNK_SIZE: "1000"
      LIST_WORKERS: "4"
      RULE_PRECEDENCE: "5000"
      STATE_FILE: .cf-zt-oisd-state.json
      LANGUAGE: ru

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Check required secrets are present
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          echo "Secrets are present"

      - name: Update Cloudflare lists
        run: cf-zt-oisd-sync update --yes --json

      - name: Commit state file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cf-zt-oisd-state.json
          git diff --cached --quiet || git commit -m "Update Cloudflare OISD sync state"
          git push